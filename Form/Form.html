<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light p-5">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8 bg-secondary p-5 rounded-4 shadow">
            <h2 class="mb-4 text-center">Developer Profile Setup</h2>

            <form class="needs-validation" novalidate>

                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label for="firstName" class="form-label">First Name</label>
                        <input type="text" class="form-control" id="firstName" required>
                        <div class="valid-feedback">Looks good!</div>
                        <div class="invalid-feedback">Please enter your first name.</div>
                    </div>
                    <div class="col-md-6">
                        <label for="lastName" class="form-label">Last Name</label>
                        <input type="text" class="form-control" id="lastName" required>
                        <div class="valid-feedback">Looks good!</div>
                        <div class="invalid-feedback">Please enter your last name.</div>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="username" class="form-label">GitHub Username</label>
                    <div class="input-group has-validation">
                        <span class="input-group-text" id="addon-wrapping">@</span>
                        <input type="text" class="form-control" id="username" aria-describedby="addon-wrapping" required>
                        <div class="invalid-feedback">Please choose a username.</div>
                    </div>
                </div>

                <div class="form-floating mb-4 text-dark">
                    <input type="email" class="form-control" id="floatingEmail" placeholder="name@example.com" required>
                    <label for="floatingEmail">Email address</label>
                    <div class="invalid-feedback">Please provide a valid email.</div>
                </div>

                <div class="mb-4">
                    <label for="roleSelect" class="form-label">Primary Role</label>
                    <select class="form-select" id="roleSelect" required>
                        <option selected disabled value="">Choose your path...</option>
                        <option value="1">Frontend Developer</option>
                        <option value="2">Backend Developer</option>
                        <option value="3">Full Stack Developer</option>
                    </select>
                    <div class="invalid-feedback">Please select a valid role.</div>
                </div>

                <div class="mb-4">
                    <label for="customRange" class="form-label">Daily Study Goal (Hours)</label>
                    <input type="range" class="form-range" min="1" max="8" step="1" id="customRange">
                </div>

                <div class="mb-4">
                    <p class="mb-2">Experience Level</p>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="expOptions" id="radioBeginner" required>
                        <label class="form-check-label" for="radioBeginner">Beginner</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="expOptions" id="radioPro" required>
                        <label class="form-check-label" for="radioPro">Pro</label>
                    </div>
                </div>

                <div class="form-check mb-5">
                    <input class="form-check-input" type="checkbox" id="invalidCheck" required>
                    <label class="form-check-label" for="invalidCheck">
                        I agree to the Terms and Conditions
                    </label>
                    <div class="invalid-feedback">
                        You must agree before submitting
                    </div>
                </div>

                <button class="btn btn-primary w-100 py-2 fw-bold" type="submit">Complete Setup</button>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
