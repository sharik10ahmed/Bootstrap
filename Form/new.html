<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" width="device-width, initial-scale=1.0">
    <title>Form Practice</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-light p-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8 bg-secondary p-5 rounded-4 shadow">
                <h2 class="text-center">Dev Details</h2>
                <form class="needs-validation" novalidate>
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label for="firstName" class="form-label">First Name</label>
                            <input type="text" id="firstName" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label for="lastName" class="form-label">Last Name</label>
                            <input type="text" id="lastName" class="form-control">
                        </div>
                    </div>
                    <label class="form-label" for="username">GitHub Username</label>
                    <div class="input-group">
                        <span class="input-group-text">@</span>
                        <input type="text" class="form-control" id="username">
                    </div><br>
                    <div class="form-floating text-dark">
                        <input type="email" class="form-control" id="floatingEmail" placeholder="name@example.com" required>
                        <label for="floatingEmail">Email address</label>
                    </div><br>
                    <label class="form-label" for="role">Primary Role</label>
                    <select class="form-select id=role" required>
                        <option selected disabled value="">Choose your role...</option>
                        <option value="1">Frontend</option>
                        <option value="2">Backend</option>
                        <option value="3">Full stack Developer</option>
                    </select><br>
                    <label class="form-label" for="range">Daily Study Goal</label>
                    <input type="range" class="form-range" max="8" min="1" step="1" id="range">
                    <br><br>
                    <label class="form-label" for="level">Experience level</label><br>
                    <input class="form-check-input" type="radio" name="exp" id="Begin">
                    <label class="form-check-label" for="Begin">Beginner</label>
                    <input class="form-check-input" type="radio" name="exp" id="Pro">
                    <label class="form-check-label" for="Pro">Pro</label><br><br>
                    <input class="form-check-input" type="checkbox" id="checkbox">
                    <label class="form-check-label" for="checkbox">I agree to all the terms and conditions</label>
                    <br><br><br>
                    <button class="btn btn-primary w-100 py-2 fw-bold" type="submit">Complete Setup</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
