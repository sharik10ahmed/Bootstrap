<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="bg-dark text-light p-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8 bg-secondary p-5 rounded-4 shadow">
                <h2 class="text-center">Dev Details</h2>
                <form class="needs-validation" novalidate>
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label" for="firstName">First Name</label>
                            <input type="text" class="form-control" id="firstName">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="lastName">Last Name</label>
                            <input type="text" class="form-control" id="lastName">
                        </div>
                    </div>
                    <label class="form-label" for="username">GitHub Username</label>
                    <div class="input-group">
                        <span class="input-group-text">@</span>
                        <input type="text" class="form-control" id="username">
                    </div><br>
                    <div class="form-floating">
                        <input type="email" class="form-control" id="floatingEmail" placeholder="name@example.com" required>
                        <label class="form-floating" for="floatingEmail">Email address</label>
                    </div><br>
                    <label class="form-label" for="role">Primary role</label>
                    <select class="form-select" id="role">
                        <option selected disabled value="">Choose your path...</option>
                        <option value="1">Frontend</option>
                        <option value="2">Backend</option>
                        <option value="3">Full-stack</option>
                    </select><br>
                    <label class="form-label" for="range">Daily Study Goal</label>
                    <input class="form-range" type="range" id="range" min="1" max="8" step="1">
                    <br><br>
                    <label class="form-label" for="Exp">Experience Level</label><br>
                    <input type="radio" class="form-check-input" name="Exp" id="begin">
                    <label class="form-check-label" for="begin">Beginner</label>
                    <input type="radio" class="form-check-input" name="Exp" id="Pro">
                    <label class="form-check-label" for="Pro" name="Exp">Pro</label>
                    <br><br>
                    <input type="checkbox" class="form-check-input" id="checkbox">
                    <label class="form-check-label" for="checkbox">I agree to all the Terms and Conditions</label>
                    <br><br><br>
                    <button class="btn btn-primary w-100 py-2 fw-bold" type="submit">Complete Setup</button>
                </form>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
</body>

</html>
