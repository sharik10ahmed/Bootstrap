<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My_FORM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="row justify-content-center">
    <h2 class="text-center">Dev Details</h2>
    <form class="needs-validation" novalidate>
        <label for="firstName" class="form-label">First Name</label>
        <input type="text" class="form-control" id="firstName">
        <label for="lastName" class="form-control">Last Name</label>
        <input type="text" class="form-control" id="lastName">
        <label for="username" class="form-label">GitHub Username</label>
        <div class="input-group">
        <span class="input-group-text">@</span>
        <input type="text" class="form-control" id="username">
        </div>
        <div class="form-floating text-dark">
        <input type="email" class="form-control" id="floatingEmail" placeholder="name@example.com" required>
        <label for="floatingEmail">Email address</label>
        </div>
        <label for="role" class="form-label">Primary Role</label>
        <select class="form-select" id="role" required>
            <option selected disabled value="">Choose your path...</option>
            <option value="1">Frontend</option>
            <option value="2">Backend</option>
            <option value="3">Full Stack</option>
        </select>
        <label for="range" class="form-label">Daily Study Goal</label>
        <input type="range" class="form-range" min="1" max="8" step="1" id="range">
        <div>
        <label for="level" class="form-label">Experience Level</label>
        <br>
        <input class="form-check-input" type="radio" name="exOp" id="optionBe" required>
        <label class="form-check-label" for="optionBe">Beginner</label>
        <input class="form-check-input" type="radio" name="exOp" id="optionPro" required>
        <label class="form-check-label" for="optionPro">Pro</label>
        </div>
        <br>
        <div>
        <input class="form-check-input" type="checkbox" id="checkbox">
        <label class="form-check-label" for="checkbox">I agree to all the terms and conditions</label>
        </div>
        <br><br>
        <button class="btn btn-primary w-100 py-2 fw-bold" type="submit">Complete Setup</button>
    </form> 
    </div>
</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
