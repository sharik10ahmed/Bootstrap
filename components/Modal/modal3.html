<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Remarks Modal</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <div class="container mt-5 text-center">
    <h3 class="mb-4">Remarks Modal Example</h3>

    <!-- Button -->
    <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#remarksModal">
      Add Remarks
    </button>
  </div>

  <!-- Modal -->
  <div class="modal fade" id="remarksModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">

        <!-- Header -->
        <div class="modal-header">
          <h5 class="modal-title">Add Remarks</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <!-- Body -->
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Remarks</label>
            <textarea 
              id="remarks" 
              class="form-control" 
              rows="4" 
              placeholder="Enter your remarks..."></textarea>
          </div>
        </div>

        <!-- Footer -->
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          <button class="btn btn-success" onclick="submitRemarks()">Submit</button>
        </div>

      </div>
    </div>
  </div>

  <!-- Output -->
  <div class="container mt-4">
    <h5>Saved Remarks:</h5>
    <ul id="remarksList" class="list-group"></ul>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Script -->
  <script>
    function submitRemarks() {
      const textarea = document.getElementById("remarks");
      const value = textarea.value.trim();

      if (value === "") {
        alert("Please enter remarks");
        return;
      }

      // Create list item
      const li = document.createElement("li");
      li.className = "list-group-item";
      li.innerText = value;

      document.getElementById("remarksList").appendChild(li);

      // Clear textarea
      textarea.value = "";

      // Close modal
      const modal = bootstrap.Modal.getInstance(document.getElementById('remarksModal'));
      modal.hide();
    }
  </script>

</body>
</html>
