<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap Table Mastery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light p-5">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-10 bg-secondary p-4 rounded-4 shadow">
            <h3 class="mb-4 text-center text-white">Active Server Nodes</h3>

            <div class="table-responsive">
                
                <table class="table table-dark table-striped table-hover table-bordered align-middle mb-0">
                    
                    <thead>
                        <tr class="table-secondary text-dark text-center">
                            <th scope="col">Node ID</th>
                            <th scope="col">Location</th>
                            <th scope="col">CPU Usage</th>
                            <th scope="col">Status</th>
                            <th scope="col">Actions</th>
                        </tr>
                    </thead>
                    
                    <tbody class="table-group-divider text-center">
                        
                        <tr>
                            <th scope="row">SRV-Alpha</th>
                            <td>New York, US</td>
                            <td>45%</td>
                            <td class="table-success text-dark fw-bold">Online</td>
                            <td>
                                <button class="btn btn-sm btn-outline-light">Manage</button>
                            </td>
                        </tr>

                        <tr>
                            <th scope="row">SRV-Beta</th>
                            <td>London, UK</td>
                            <td>82%</td>
                            <td class="table-warning text-dark fw-bold">High Load</td>
                            <td>
                                <button class="btn btn-sm btn-outline-light">Manage</button>
                            </td>
                        </tr>

                        <tr class="table-danger text-dark">
                            <th scope="row">SRV-Gamma</th>
                            <td>Tokyo, JP</td>
                            <td>--</td>
                            <td class="fw-bold">Offline</td>
                            <td>
                                <button class="btn btn-sm btn-danger">Restart</button>
                            </td>
                        </tr>

                        <tr>
                            <th scope="row">SRV-Delta</th>
                            <td>Sydney, AU</td>
                            <td>12%</td>
                            <td class="table-success text-dark fw-bold">Online</td>
                            <td>
                                <button class="btn btn-sm btn-outline-light">Manage</button>
                            </td>
                        </tr>

                    </tbody>
                </table>
            </div> </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
